<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Satara RTO Guide - All Services</title>
    <meta
      name="description"
      content="Browse Satara RTO services by category and open dedicated guides for documents, forms, fees, office details, and official links."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="services">
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="./index.html">
          <span class="brand-mark">SR</span>
          <span class="brand-copy">
            <strong>Satara RTO Guide</strong>
            <small>Satara district, Maharashtra</small>
          </span>
        </a>

        <nav class="top-nav" aria-label="Primary">
          <a data-nav-link href="./index.html">Find My Service</a>
          <a data-nav-link href="./services.html">Services</a>
          <a data-nav-link href="./offices.html">Offices</a>
          <a data-nav-link href="./faq.html">FAQ</a>
        </nav>
      </header>

      <main class="page-shell">
        <section class="page-intro">
          <p class="eyebrow">All Services</p>
          <h1>Choose a service</h1>
          <p>Open a guide directly if you already know the service name.</p>
        </section>

        <section class="browse-shell">
          <div class="browse-toolbar">
            <label class="search-field" for="services-search">
              <span>Search services</span>
              <input id="services-search" type="search" placeholder="Search learner's licence, RC transfer, NOC, permit..." />
            </label>
            <div class="filter-row" id="services-filters"></div>
          </div>

          <div class="card-grid" id="services-results"></div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="footer-copy">
          <p>Each guide shows documents, steps, timing, forms, fees, and office guidance.</p>
        </div>
      </footer>
    </div>

    <script src="./assets/data.js"></script>
    <script src="./assets/shared.js"></script>
    <script src="./assets/shell.js"></script>
    <script src="./assets/services-page.js"></script>
  </body>
</html>
